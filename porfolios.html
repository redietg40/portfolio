<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- Security: Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; img-src 'self' https://images.unsplash.com data:; script-src 'self';">
    <title>Rediet Getahun - Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome CSS (for icons) -->
    <link 
      rel="stylesheet" 
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" 
      crossorigin="anonymous" 
      referrerpolicy="no-referrer" 
    />
</head>
<body>
    <!-- Header will be rendered by JavaScript -->
    <header id="header-container"></header>
    <section id="home" class="all-element">
        <!-- Hero section will be rendered by JavaScript -->
        <section class="hero" id="hero-container"></section>

        <!-- About section will be rendered by JavaScript -->
        <section id="about" class="about"></section>

        <!-- Skills section will be rendered by JavaScript -->
        <section id="skills" class="skill-elements"></section>

        <!-- Projects section will be rendered by JavaScript -->
        <section id="projects" class="projects-section"></section>

        <!-- Contact section will be rendered by JavaScript -->
        <section id="contact" class="contact-section"></section>
    </section>

    <!-- Footer will be rendered by JavaScript -->
    <footer class="footer" id="footer-container"></footer>

    <script src="portfolios.js"></script>
</body>
</html>
